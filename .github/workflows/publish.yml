name: Validate Release
on:
  release:
    types: [published]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - run: composer install --no-dev --prefer-dist
      - run: composer validate --strict
